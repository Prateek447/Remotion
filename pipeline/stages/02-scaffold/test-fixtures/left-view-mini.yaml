# Smoke-test fixture: tree traversal with queue + ring + outputValues.

sceneId: left-view-mini
title: "Left View Mini"
dataStructure: tree
operationKind: traversal
complexity:
  time: "O(n)"
  space: "O(n)"
voice:
  persona: teacher-energetic
code:
  language: java
  source: |
    void leftView(Node root) {
        if (root == null) return;
        Queue<Node> q = new LinkedList<>();
        q.add(root);
        while (!q.isEmpty()) {
            int n = q.size();
        }
    }

