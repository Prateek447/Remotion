# Count Total Nodes in Binary Tree — recursive size algorithm.
#
# Topology: balanced binary tree of 7 nodes
#         1
#       /   \
#      2     3
#     / \   / \
#    4   5 6   7
#
# Algorithm: countNodes(node) = node ? 1 + countNodes(left) + countNodes(right) : 0
# Result: 7 nodes, O(n) time, O(h) space.
#
# Scene structure (17 steps) follows pipeline/design-system/teaching.md:
#   - One step per recursive frame entered on the left side (n2, n4).
#   - Both null base cases of n4 shown as separate steps (return value visible).
#   - n4 / n5 / n2 each get their own return step.
#   - Right subtree (n3) compressed to ~half the step count after the pattern
#     has been demonstrated on the left.
#   - No "same thing" / "by symmetry" shortcuts.

sceneId: count-tree-nodes
title: "Count Tree Nodes"
subtitle: "Recursive size of a binary tree"
dataStructure: tree
operationKind: traversal
complexityTier: 1

complexity:
  time: "O(n)"
  space: "O(h)"

approach: algorithm-walkthrough
approachNotes: |
  Full recursion-frame trace on a 7-node balanced tree. Every call entered,
  every base case shown, return values bubbled up visibly before parents
  combine. Codebase default — matches all existing tree scenes; no custom
  scaffolder template needed.

  Community sources surveyed:
  - MIT 6.006 lecture on tree traversals (algorithm-walkthrough)
  - NeetCode "Count Good Nodes" video (algorithm-walkthrough, smaller tree)
  - GeeksforGeeks "Size of Binary Tree" article (algorithm-walkthrough)
  - 3Blue1Brown does not cover this specific topic (recursion is covered at the
    paradigm level — out of scope for a single-algorithm scene)

  All three reference sources use the algorithm-walkthrough archetype.
  Picked the default for consistency.

voice:
  persona: teacher-energetic

code:
  language: java
  source: |
    int countNodes(Node node) {
        if (node == null) return 0;
        int left = countNodes(node.left);
        int right = countNodes(node.right);
        return 1 + left + right;
    }

# Fractional positions per format. Trees use hand-tuned layouts.
