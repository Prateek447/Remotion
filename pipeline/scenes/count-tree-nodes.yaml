# Count Total Nodes in Binary Tree — recursive size algorithm.
#
# ⚠ Audio for this scene is produced from the chunked-narration sidecar at
#   `pipeline/scenes/count-tree-nodes.narration.yaml` — that file is the
#   authoritative source for what Chatterbox speaks. The `narration` field on
#   each step below is a content-only draft (the words for the step) used to
#   seed chunk text and as a readability reference. It is NOT consumed at
#   audio-generation time. See `pipeline/design-system/teaching.md`
#   "Natural prosody (chunked narration)".
#
# Topology: balanced binary tree of 7 nodes
#         1
#       /   \
#      2     3
#     / \   / \
#    4   5 6   7
#
# Algorithm: countNodes(node) = node ? 1 + countNodes(left) + countNodes(right) : 0
# Result: 7 nodes, O(n) time, O(h) space.
#
# Scene structure (26 steps) follows pipeline/design-system/teaching.md at
# strict density — every recursive frame is its own step:
#   - Each of the 7 internal nodes has its own entry step (n1..n7).
#   - Each of the 8 null base cases has its own step with return value visible.
#   - Each internal combine (n4, n5, n2, n6, n7, n3, n1) has its own step.
#   - n5, n6, n7 are NOT compressed via "by-symmetry" — each gets the full
#     entry / null-left / null-right / combine breakdown like n4 does.
#   - No "same thing" / "mirrors" language anywhere — every node speaks for
#     itself with concrete numbers.

sceneId: count-tree-nodes
title: "Count Tree Nodes"
subtitle: "Recursive size of a binary tree"
dataStructure: tree
operationKind: traversal
complexityTier: 1

complexity:
  time: "O(n)"
  space: "O(h)"

approach: algorithm-walkthrough
approachNotes: |
  Full recursion-frame trace on a 7-node balanced tree. Every call entered,
  every base case shown, every return value bubbles up visibly before the
  parent combines. No "by-symmetry" shortcut on n5 / n6 / n7 — each gets
  its own entry, two base-case nulls, and combine step.

  Community sources surveyed (7): algomaster.io, GeeksforGeeks (complete
  tree + iterative), takeuforward, algo.monster, martinbroadhurst,
  Javanotes 5.0, Medium (Saha). Three distinct community archetypes
  identified and presented to the user: structural-induction (Javanotes
  derives count from the recursive definition of trees themselves),
  iterative-bfs-contrast (level-order with explicit queue),
  brute-force-to-optimal (O(n) → O(log²n) via complete-tree height —
  algomaster.io and algo.monster). User picked algorithm-walkthrough
  for codebase compatibility and full-density teaching value.

voice:
  persona: teacher-energetic

code:
  language: java
  source: |
    int countNodes(Node node) {
        if (node == null) return 0;
        int left = countNodes(node.left);
        int right = countNodes(node.right);
        return 1 + left + right;
    }

