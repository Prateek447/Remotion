        pauseAfter: 0.4
      - id: "2.4"
        intent: "enumerating two recursive calls"
        text: "recurse left, recurse right,"
        params: { exaggeration: 0.60, cfg_weight: 0.55, temperature: 0.88 }
        pauseAfter: 0.35
      - id: "2.5"
