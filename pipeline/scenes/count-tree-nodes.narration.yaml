# Hand-authored chunked narration — count-tree-nodes
#
# This sidecar replaces the auto-resolved (persona × arc → single triple) model
# from count-tree-nodes.yaml's `narration` field. Each step is broken into
# emotion-coherent chunks; each chunk carries its own (exaggeration, cfg_weight,
# temperature) triple that gets passed directly to ChatterboxTTS.generate().
#
# WHY this exists:
#   The persona × arc table emits ONE triple per step. But a single step often
#   spans multiple emotional beats — calm setup → slow arithmetic → explosive
#   reveal. One triple can't render all three convincingly; the reveal sounds
#   flat or the setup sounds shouty. Chunking puts the param control at the
#   beat level, where the emotion actually changes.
#
# HOW the audio generator should consume this:
#   For each step:
#     1. For each chunk in order: run ChatterboxTTS.generate(chunk.text, **chunk.params)
#     2. Splice torch.zeros(int(chunk.pauseAfter * sr)) after each chunk's audio
#     3. Concatenate all chunks → step-N.mp3 (final apply.py timing reads this)
#   Optional: keep per-chunk wav at step-N-M.wav for surgical regenerate.
#
# REPRODUCIBILITY:
#   Each chunk has a stable `id` (step.chunk, e.g. "24.5" = step 24 chunk 5).
#   Once a take of a chunk lands well at its params, lock it by adding
#   `seed: <int>` to that chunk. Future regenerates with the same seed +
#   params + Chatterbox version produce identical audio. Re-rolling is just
#   removing the seed.
#
# PARAM PHILOSOPHY (knob coupling per Chatterbox README):
#   - Higher exaggeration → faster, more excited delivery.
#   - Lower cfg_weight   → slower, more deliberate pacing (compensates).
#   - Pairs to bump together: ex↑ cfg↓ for energy, ex↓ cfg↑ for calm.
#   - Temperature 0.85-0.95: lower = more stable but flatter, higher = more
#     varied but riskier. Calm beats lean 0.85; peak reveal goes 0.95.
#
# Ranges actually used in this file (read this as a legend):
#   calm orientation         ex≈0.50, cfg≈0.62, temp≈0.85
#   standard methodical      ex≈0.60, cfg≈0.55, temp≈0.88
#   curious / lean-in        ex≈0.65, cfg≈0.52, temp≈0.90
#   mini-reveal / "returns N"ex≈0.75, cfg≈0.45, temp≈0.92
#   subtree-completed return ex≈0.80, cfg≈0.42, temp≈0.93
#   PEAK reveal (one time)   ex≈0.95, cfg≈0.32, temp≈0.95
#   closing CTA              ex≈0.75, cfg≈0.48, temp≈0.92

schemaVersion: 0.1
sceneId: count-tree-nodes
sourceScene: pipeline/scenes/count-tree-nodes.yaml

voice:
  reference: scripts/clone.wav  # set to whatever reference clip the audio gen uses
  model: chatterbox-tts          # informational

# Output layout the audio generator should produce:
#   public/narration/count-tree-nodes/step-N.mp3        (concatenated, what apply.py reads)
#   public/narration/count-tree-nodes/chunks/step-N-M.wav  (per-chunk debug, optional)
output:
  baseDir: public/narration/count-tree-nodes
  perChunkDebug: true

steps:
  # ── Step 0: opening — orient + pose the question ─────────────────────────
  - stepIndex: 0
    intent: "Orientation + pose the question"
    chunks:
      - id: "0.0"
        intent: "invitation, slight excitement"
        text: "Alright, watch this."
        params: { exaggeration: 0.65, cfg_weight: 0.55, temperature: 0.88 }
        pauseAfter: 0.35
      - id: "0.1"
        intent: "calm orientation"
        text: "A binary tree."
        params: { exaggeration: 0.50, cfg_weight: 0.62, temperature: 0.85 }
        pauseAfter: 0.25
      - id: "0.2"
        intent: "matter-of-fact"
        text: "Seven nodes total."
        params: { exaggeration: 0.55, cfg_weight: 0.60, temperature: 0.85 }
        pauseAfter: 0.55
      - id: "0.3"
        intent: "curious lean-in — the actual question"
        text: "So, how does code count them all?"
        params: { exaggeration: 0.72, cfg_weight: 0.50, temperature: 0.92 }
        pauseAfter: 0.0

  # ── Step 1: name recursion as the mechanism ──────────────────────────────
  - stepIndex: 1
    intent: "Name the recursive idea"
    chunks:
      - id: "1.0"
        intent: "confident setup"
        text: "Right. Here's the idea."
        params: { exaggeration: 0.62, cfg_weight: 0.55, temperature: 0.88 }
        pauseAfter: 0.4
      - id: "1.1"
        intent: "posing the recursive question"
        text: "Each node asks — how big is my subtree?"
        params: { exaggeration: 0.66, cfg_weight: 0.52, temperature: 0.90 }
        pauseAfter: 0.5
      - id: "1.2"
        intent: "answer follow-through"
        text: "And then adds one for itself."
        params: { exaggeration: 0.60, cfg_weight: 0.55, temperature: 0.88 }
        pauseAfter: 0.0

  # ── Step 2: show the code, the three rules ───────────────────────────────
  - stepIndex: 2
    intent: "Read the formula off the code"
    chunks:
      - id: "2.0"
        intent: "orient to code"
        text: "Look at the code."
        params: { exaggeration: 0.55, cfg_weight: 0.60, temperature: 0.85 }
        pauseAfter: 0.35
      - id: "2.1"
        intent: "conditional setup"
        text: "If null,"
        params: { exaggeration: 0.55, cfg_weight: 0.58, temperature: 0.88 }
        pauseAfter: 0.4
      - id: "2.2"
        intent: "matter-of-fact base case"
        text: "return zero."
        params: { exaggeration: 0.55, cfg_weight: 0.60, temperature: 0.85 }
        pauseAfter: 0.55
      - id: "2.3"
